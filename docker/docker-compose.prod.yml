version: "3.8"
# ═══════════════════════════════════════════════════════════════════
# Titan Cloud Phone — All-in-One Production Deployment
# Deploy with: docker-compose -f docker-compose.prod.yml up -d
#
# Access:
#   https://your-server/            → Titan Console
#   https://your-server/scrcpy/     → H264 Cloud Phone (VMOS-like)
#   https://your-server/mobile#ID   → Mobile viewer + AI agent
#   https://your-server/api/        → REST API
#
# Requirements:
#   - Linux host with Docker
#   - binder_linux kernel module (for Redroid)
#   - 4+ CPU cores, 8+ GB RAM, 20+ GB disk
# ═══════════════════════════════════════════════════════════════════

services:
  # ─── ANDROID DEVICE (Redroid) ──────────────────────────────────
  android:
    image: redroid/redroid:14.0.0-latest
    container_name: titan-android
    privileged: true
    restart: unless-stopped
    ports:
      - "5555:5555"
    volumes:
      - android-data:/data
    command:
      - androidboot.redroid_gpu_mode=guest
      - androidboot.redroid_width=1080
      - androidboot.redroid_height=2400
      - androidboot.redroid_fps=30
      - androidboot.redroid_dpi=420
    deploy:
      resources:
        limits:
          memory: 3g
          cpus: "2.0"

  # ─── TITAN API SERVER ─────────────────────────────────────────
  titan-api:
    image: python:3.12-slim
    container_name: titan-api
    restart: unless-stopped
    working_dir: /opt/titan
    ports:
      - "8080:8080"
    volumes:
      - ../core:/opt/titan/core:ro
      - ../server:/opt/titan/server:ro
      - ../console:/opt/titan/console:ro
      - titan-data:/opt/titan/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
      - /usr/bin/adb:/usr/bin/adb
      - /root/.android:/root/.android
    environment:
      - PYTHONPATH=/opt/titan/server:/opt/titan/core
      - TITAN_DATA=/opt/titan/data
      - TITAN_GPU_OLLAMA=${TITAN_GPU_OLLAMA:-http://host.docker.internal:11435}
    command: >
      bash -c "
        pip install -q fastapi uvicorn pydantic pillow 2>/dev/null &&
        python3 -m uvicorn server.titan_api:app --host 0.0.0.0 --port 8080 --workers 1
      "
    depends_on:
      - android

  # ─── WS-SCRCPY (H264 Cloud Phone) ─────────────────────────────
  ws-scrcpy:
    image: scavin/ws-scrcpy:latest
    container_name: titan-scrcpy
    restart: unless-stopped
    network_mode: host
    volumes:
      - /usr/bin/adb:/usr/bin/adb
      - /root/.android:/root/.android
    depends_on:
      - android

  # ─── NGINX (SSL + Routing) ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: titan-nginx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - titan-api
      - ws-scrcpy

volumes:
  android-data:
  titan-data:
