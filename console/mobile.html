<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e17">
<title>Titan Device</title>
<link rel="manifest" href="/static/manifest.json">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; touch-action:none; }
  #screen { width:100%; height:calc(100% - 48px); display:flex; align-items:center; justify-content:center; background:#0a0e17; }
  #screen canvas { max-width:100%; max-height:100%; object-fit:contain; }
  #navbar { height:48px; background:#111827; border-top:1px solid #1e293b; display:flex; align-items:center; justify-content:space-around; }
  .nav-btn { color:#64748b; font-size:11px; display:flex; flex-direction:column; align-items:center; gap:2px; background:none; border:none; padding:4px 16px; cursor:pointer; }
  .nav-btn:active { color:#00d4ff; }
  .nav-btn span { font-size:18px; }
  #status { position:fixed; top:8px; right:8px; z-index:10; font-size:10px; color:#64748b; background:rgba(0,0,0,0.7); padding:2px 8px; border-radius:8px; }
  .connecting { color:#eab308; }
  .connected { color:#22c55e; }
  .error { color:#ef4444; }
</style>
</head>
<body>
<div id="status" class="connecting">Connecting...</div>

<div id="screen">
  <canvas id="canvas"></canvas>
</div>

<nav id="navbar">
  <button class="nav-btn" onclick="sendKey('KEYCODE_APP_SWITCH')"><span>▣</span>Recents</button>
  <button class="nav-btn" onclick="sendKey('KEYCODE_HOME')"><span>●</span>Home</button>
  <button class="nav-btn" onclick="sendKey('KEYCODE_BACK')"><span>◀</span>Back</button>
  <button class="nav-btn" onclick="toggleSettings()"><span>⚙</span>Settings</button>
</nav>

<script>
const deviceId = location.hash.replace('#','') || new URLSearchParams(location.search).get('device') || '';
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');

let ws = null;
let reconnectTimer = null;

function connect() {
  if (ws && ws.readyState <= 1) return;
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = proto + '//' + location.host + '/ws/screen/' + deviceId;
  status.className = 'connecting';
  status.textContent = 'Connecting...';

  ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    status.className = 'connected';
    status.textContent = '● Live';
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  };

  ws.onmessage = (e) => {
    const blob = new Blob([e.data], { type: 'image/jpeg' });
    const img = new Image();
    img.onload = () => {
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      URL.revokeObjectURL(img.src);
    };
    img.src = URL.createObjectURL(blob);
  };

  ws.onclose = () => {
    status.className = 'error';
    status.textContent = 'Disconnected';
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => { ws.close(); };
}

// Touch → ADB input
let touchStart = null;
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  touchStart = {
    x: (t.clientX - rect.left) / rect.width,
    y: (t.clientY - rect.top) / rect.height,
    time: Date.now()
  };
});

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (!touchStart) return;
  const t = e.changedTouches[0];
  const rect = canvas.getBoundingClientRect();
  const endX = (t.clientX - rect.left) / rect.width;
  const endY = (t.clientY - rect.top) / rect.height;
  const dx = endX - touchStart.x;
  const dy = endY - touchStart.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const dt = Date.now() - touchStart.time;

  if (dist < 0.03 && dt < 300) {
    sendTap(touchStart.x, touchStart.y);
  } else if (dist >= 0.03) {
    sendSwipe(touchStart.x, touchStart.y, endX, endY, dt);
  }
  touchStart = null;
});

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top) / rect.height;
  sendTap(x, y);
});

function sendTap(x, y) {
  fetch('/api/devices/' + deviceId + '/input', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({type:'tap', x: x, y: y})
  }).catch(() => {});
}

function sendSwipe(x1, y1, x2, y2, duration) {
  fetch('/api/devices/' + deviceId + '/input', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({type:'swipe', x1:x1, y1:y1, x2:x2, y2:y2, duration: duration})
  }).catch(() => {});
}

function sendKey(keycode) {
  fetch('/api/devices/' + deviceId + '/input', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({type:'key', keycode: keycode})
  }).catch(() => {});
}

function toggleSettings() {
  window.location.href = '/#devices';
}

if (deviceId) {
  connect();
} else {
  status.textContent = 'No device ID — use /mobile#dev-xxx or ?device=dev-xxx';
  status.className = 'error';
}
</script>
</body>
</html>
